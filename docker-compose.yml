# CineBook Multi-container Setup
services:
  # ─── MongoDB ───────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: cinebook-mongo
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cinebook-network

  # ─── Backend API ───────────────────────────────────
  backend:
    build:
      context: ./bms-backend
      dockerfile: Dockerfile
    container_name: cinebook-backend
    restart: unless-stopped
    expose:
      - "9000"
    env_file:
      - ./bms-backend/.env
    environment:
      - MONGO_CONNECTION_STRING=mongodb://mongo:27017/bookmyscreen
      - PORT=9000
      - JWT_SECRET=cinebook_jwt_secret_2026
      - HASH_SECRET=cinebook_hash_secret_2026
      - ACCESS_TOKEN_SECRET=cinebook_access_token_secret_2026
      - REFRESH_TOKEN_SECRET=cinebook_refresh_token_secret_2026
    depends_on:
      - mongo
    networks:
      - cinebook-network

  # ─── Frontend (Nginx) ─────────────────────────────
  frontend:
    build:
      context: ./bms-frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-/api/v1}
    container_name: cinebook-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cinebook-network

volumes:
  mongo_data:

networks:
  cinebook-network:
    driver: bridge
