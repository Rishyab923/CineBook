---
# ============================================
# CineBook - Ansible Deployment Playbook
# Deploys Docker containers to AWS EC2
# Runs LOCALLY on EC2 (triggered by Jenkins via SSH)
# ============================================

- name: Deploy CineBook to AWS EC2
  hosts: localhost
  connection: local
  become: true

  vars:
    app_dir: /home/ubuntu/CineBook
    github_repo: https://github.com/KiranYBPatil/CineBook.git
    ec2_ip: "{{ lookup('pipe', 'curl -s -m 5 http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null') | default('32.236.37.142', true) }}"
    deploy_version: "{{ lookup('file', app_dir + '/VERSION', errors='ignore') | default('latest', true) | trim }}"

  tasks:

    # ─── 1. Install System Dependencies ────────────────
    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - git
        state: present
        update_cache: yes

    # ─── 2. Install Docker ─────────────────────────────
    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # ─── 3. Setup Swap Space ───────────────────────────
    - name: Create swap file if not present
      shell: |
        if [ ! -f /swapfile ]; then
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo "Created 2GB swap"
        else
          swapon /swapfile 2>/dev/null || true
          echo "Swap already exists"
        fi
      register: swap_result
      changed_when: "'Created' in swap_result.stdout"

    - name: Show swap status
      debug:
        msg: "{{ swap_result.stdout }}"

    # ─── 4. Clone / Update Repository ──────────────────
    - name: Clone CineBook repository
      git:
        repo: "{{ github_repo }}"
        dest: "{{ app_dir }}"
        version: main
        force: yes
      become_user: ubuntu

    # ─── 5. Create Backend .env File ───────────────────
    - name: Create backend .env file
      copy:
        dest: "{{ app_dir }}/bms-backend/.env"
        content: |
          PORT=9000
          MONGO_CONNECTION_STRING=mongodb://mongo:27017/bookmyscreen
          JWT_SECRET=cinebook_jwt_secret_2026
          ACCESS_TOKEN_SECRET=cinebook_access_token_secret_2026
          REFRESH_TOKEN_SECRET=cinebook_refresh_token_secret_2026
          HASH_SECRET=cinebook_hash_secret_2026
          FRONTEND_URL=http://{{ ec2_ip }}
          NODEMAILER_EMAIL=
          NODEMAILER_PASSWORD=
        owner: ubuntu
        mode: "0600"

    - name: Show detected EC2 IP
      debug:
        msg: "FRONTEND_URL set to http://{{ ec2_ip }}"

    # ─── 6. Stop Existing Containers ───────────────────
    - name: Stop existing containers
      shell: docker compose down --remove-orphans
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu
      ignore_errors: yes

    # ─── 7. Build & Start Containers ───────────────────
    - name: Build and start containers
      shell: docker compose up -d --build
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu
      environment:
        VITE_BACKEND_URL: "/api/v1"
        IMAGE_TAG: "{{ deploy_version }}"

    # ─── 7b. Tag built images with version ───────────
    - name: Tag Docker images with version
      shell: |
        docker tag 02fe23bcs129/cinebook-backend:{{ deploy_version }} 02fe23bcs129/cinebook-backend:latest
        docker tag 02fe23bcs129/cinebook-frontend:{{ deploy_version }} 02fe23bcs129/cinebook-frontend:latest
        echo "Tagged images with version {{ deploy_version }}"
      become_user: ubuntu
      when: deploy_version != 'latest'

    # ─── 8. Health Check ───────────────────────────────
    - name: Wait for backend to be healthy
      uri:
        url: "http://localhost/api/v1/movies"
        status_code: 200
      register: health
      until: health.status == 200
      retries: 15
      delay: 10

    # ─── 9. Deployment Complete ────────────────────────
    - name: Deployment complete
      debug:
        msg: |
          ════════════════════════════════════════
          ✅ CineBook Deployed via Ansible!
          🌐 Frontend: http://{{ ec2_ip }}
          🔧 API:      http://{{ ec2_ip }}/api/v1
          🏷️  Version:  {{ deploy_version }}
          ════════════════════════════════════════
