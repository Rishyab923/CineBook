server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Reverse-proxy API calls to the backend container ───
    # This makes /api/v1/* requests go to backend:9000/api/v1/*
    # Eliminates CORS (same-origin) and no need to expose port 9000
    location /api/ {
        proxy_pass         http://cinebook-backend:9000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Serve static files / SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for the HTML shell (so new deployments are picked up)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

